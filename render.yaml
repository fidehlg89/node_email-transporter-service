services:
  # Backend Web Service
  - type: web
    name: email-transporter-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: PORT
        value: 3005

  # Frontend Static Site
  - type: web
    name: email-transporter-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: email-transporter-backend
          property: host
